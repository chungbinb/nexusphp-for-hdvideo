name: Deploy dev to BaoTa test

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: deploy-dev-test
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, hdvideo-test]

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4

      - name: Sync files to test site
        run: |
          set -euo pipefail
          SITE_ROOT=/www/wwwroot/hdvideo.test
          mkdir -p "$SITE_ROOT"
          rsync -a --delete \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".env" \
            --exclude=".ssh-deploy*.json" \
            --exclude="old/" \
            --exclude="public/old" \
            --exclude="composer.json" \
            --exclude="composer.lock" \
            --exclude="/vendor/" \
            --exclude="node_modules/" \
            --exclude="storage/" \
            --exclude="attachments/" \
            --exclude="bitbucket/" \
            --exclude="subs/" \
            --exclude="torrents/" \
            --exclude="plugins/" \
            --exclude="resources/upload/" \
            --exclude="resources/geoip/" \
            --exclude="imdb/cache/" \
            --exclude="imdb/images/" \
            --exclude="public/hot" \
            --exclude="public/storage" \
            --exclude="public/attachments/" \
            --exclude="public/bitbucket/" \
            --exclude="tmp_audit/" \
            --exclude="scripts/_backup*" \
            --exclude="scripts/_diag*" \
            --exclude="scripts/_live*" \
            --exclude="scripts/_lint*" \
            --exclude="scripts/_ajax_methods.txt" \
            --exclude="scripts/_help_new.txt" \
            --exclude="scripts/_hook.php" \
            --exclude="scripts/_hr_*.php" \
            --exclude="scripts/_stdhead_personalize.txt" \
            --exclude="scripts/_torrents_*.txt" \
            ./ "$SITE_ROOT"/

      - name: Regenerate autoloader (dump-autoload only — never install/remove, preserves manually-managed vendor plugins)
        run: |
          set -euo pipefail
          cd /www/wwwroot/hdvideo.test
          export COMPOSER_ALLOW_SUPERUSER=1
          composer dump-autoload --optimize --no-interaction

      - name: Clear cache and fix permissions
        run: |
          set -euo pipefail
          cd /www/wwwroot/hdvideo.test
          php artisan optimize:clear || true
          chown -R www:www /www/wwwroot/hdvideo.test
          chmod -R ug+rwX storage bootstrap/cache

      - name: Restart Zha Jin Hua room worker
        run: |
          set -euo pipefail
          sudo -u www bash /www/wwwroot/hdvideo.test/scripts/restart-zjh-worker.sh /www/wwwroot/hdvideo.test

      - name: Normalize nginx HTTPS redirects
        run: |
          set -euo pipefail
          changed=0
          for dir in /www/server/panel/vhost/nginx /www/server/nginx/conf /www/server/nginx/conf/conf.d; do
            [ -d "$dir" ] || continue
            while IFS= read -r -d '' conf; do
              if sudo grep -qE '(:443|\$server_port|return[[:space:]]+301|rewrite)' "$conf"; then
                echo "Inspecting nginx redirect config: $conf"
                sudo grep -nE '(:443|\$server_port|return[[:space:]]+301|rewrite)' "$conf" || true
              fi
              if sudo grep -qE 'https://[^/;"[:space:]]+:443|https://[^/;"[:space:]]+:\$server_port|https://\$host:\$server_port|https://\$server_name:\$server_port' "$conf"; then
                sudo cp "$conf" "$conf.codex-bak-$(date +%Y%m%d%H%M%S)"
                sudo perl -0pi -e 's#https://([^/;"\s]+):443#https://$1#g; s#https://([^/;"\s]+):\$server_port#https://$1#g; s#https://\$host:\$server_port#https://$host#g; s#https://\$server_name:\$server_port#https://$server_name#g' "$conf"
                changed=1
              fi
            done < <(sudo find "$dir" -type f \( -name '*.conf' -o -name '*.rewrite' \) -print0)
          done
          if [ "$changed" -eq 1 ]; then
            sudo nginx -t
            sudo systemctl reload nginx || sudo service nginx reload || sudo /etc/init.d/nginx reload
          else
            echo "No nginx redirect rule with explicit :443 or server_port target was changed."
          fi

      - name: Health check
        run: |
          set -euo pipefail
          curl -I --max-time 15 -H "Host: 192.168.200.230" http://127.0.0.1/login.php
