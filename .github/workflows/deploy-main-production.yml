name: Deploy main to BaoTa production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, hdvideo-prod]

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Backup current production site
        run: |
          set -euo pipefail
          SITE_ROOT=/www/wwwroot/hdvideo.top
          BACKUP_DIR=/www/backup/hdvideo-prod-deploy
          BACKUP_FILE="$BACKUP_DIR/hdvideo.top-code-$(date +%Y%m%d%H%M%S).tar.gz"
          sudo mkdir -p "$BACKUP_DIR"
          if [ -d "$SITE_ROOT" ]; then
            sudo tar -C "$SITE_ROOT" \
              --exclude="./.env" \
              --exclude="./vendor" \
              --exclude="./node_modules" \
              --exclude="./storage" \
              --exclude="./attachments" \
              --exclude="./bitbucket" \
              --exclude="./subs" \
              --exclude="./public/attachments" \
              --exclude="./public/bitbucket" \
              -czf "$BACKUP_FILE" .
            echo "Backup created: $BACKUP_FILE"
          fi

      - name: Sync files to production site
        run: |
          set -euo pipefail
          SITE_ROOT=/www/wwwroot/hdvideo.top
          sudo mkdir -p "$SITE_ROOT"
          sudo rsync -a --delete \
            --exclude=".git/" \
            --exclude=".github/" \
            --exclude=".env" \
            --exclude=".ssh-deploy*.json" \
            --exclude="vendor/" \
            --exclude="node_modules/" \
            --exclude="storage/" \
            --exclude="attachments/" \
            --exclude="bitbucket/" \
            --exclude="subs/" \
            --exclude="public/attachments/" \
            --exclude="public/bitbucket/" \
            --exclude="tmp_audit/" \
            --exclude="scripts/_backup*" \
            --exclude="scripts/_diag*" \
            --exclude="scripts/_live*" \
            --exclude="scripts/_lint*" \
            --exclude="scripts/_ajax_methods.txt" \
            --exclude="scripts/_help_new.txt" \
            --exclude="scripts/_hook.php" \
            --exclude="scripts/_hr_*.php" \
            --exclude="scripts/_stdhead_personalize.txt" \
            --exclude="scripts/_torrents_*.txt" \
            ./ "$SITE_ROOT"/

      - name: Install PHP dependencies
        run: |
          set -euo pipefail
          cd /www/wwwroot/hdvideo.top
          sudo env COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --optimize-autoloader --no-interaction

      - name: Clear cache and fix permissions
        run: |
          set -euo pipefail
          cd /www/wwwroot/hdvideo.top
          sudo php artisan optimize:clear || true
          sudo chown -R www:www /www/wwwroot/hdvideo.top
          sudo chmod -R ug+rwX storage bootstrap/cache

      - name: Health check
        run: |
          set -euo pipefail
          curl -I --max-time 15 -H "Host: hdvideo.top" http://127.0.0.1/login.php
